services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10020:3000"
    environment:
      - NODE_ENV=production
      # 如有其他环境变量，在这里添加或引用 .env 文件
      # - NEXT_PUBLIC_API_URL=http://localhost:3000
    # env_file:
    #   - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
